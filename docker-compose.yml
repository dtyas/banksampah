services:
    php:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: banksampah-php
      volumes:
        - ./backend/bank-sampah-app:/var/www/html
      depends_on:
        - mysql

    nginx:
      image: nginx:1.27-alpine
      container_name: banksampah-nginx
      ports:
        - "8000:80"
      volumes:
        - ./backend/bank-sampah-app:/var/www/html
        - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      depends_on:
        - php

    mysql:
      image: mysql:8.4
      container_name: banksampah-mysql
      restart: unless-stopped
      environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: banksampah
      ports:
        - "3307:3306"
      volumes:
        - mysql_data:/var/lib/mysql

    node:
      image: node:22-alpine
      container_name: banksampah-node
      working_dir: /app
      command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
      ports:
        - "5173:5173"
      volumes:
        - ./frontend:/app

volumes:
  mysql_data:
